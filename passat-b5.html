<!doctype html><html lang="pl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quiz Passat B5</title><style>:root{--navy:#03133a;--gold:#ffd35a;--cream:#fff8df;--ink:#111827;--red:#e33830;--green:#24d17e;--white:#fff}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;color:var(--white);background:linear-gradient(180deg,rgba(3,19,58,.94),rgba(2,9,29,.98)),url('quiz-show-car.png') center top/cover fixed}.page{min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:clamp(10px,3vw,28px)}button{font:inherit}.cover,.app{width:min(1120px,100%);border:3px solid rgba(255,211,90,.92);border-radius:18px;background:rgba(3,19,58,.95);box-shadow:0 28px 90px rgba(0,0,0,.48);overflow:hidden}.cover{display:grid;gap:16px;padding:clamp(12px,2vw,20px)}.cover-hero{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;align-items:stretch}.cover-img{width:100%;height:100%;min-height:260px;object-fit:cover;border-radius:12px;border:1px solid rgba(255,211,90,.45);background:#111}.cover-copy{display:flex;flex-direction:column;justify-content:center;gap:14px;padding:clamp(18px,3vw,30px);border-radius:12px;background:linear-gradient(180deg,rgba(6,46,129,.92),rgba(3,18,58,.98));border:1px solid rgba(255,211,90,.45)}.cover-copy h1{margin:0;font-size:clamp(2rem,5vw,4rem);line-height:.98}.cover-copy p{margin:0;font-weight:900}.badge{color:var(--gold);text-transform:uppercase;font-size:.9rem}.promo{font-size:clamp(1.15rem,3vw,2rem)}.promo strong{color:var(--gold)}.rules{display:grid;gap:8px;margin:0;padding:0;list-style:none}.rules li{padding:12px 14px;border-radius:10px;background:rgba(255,255,255,.09);font-weight:900}.start{min-height:58px;border:0;border-radius:12px;background:linear-gradient(180deg,#ffe27c,#ffb331);color:#03133a;font-weight:900;font-size:clamp(1rem,2vw,1.25rem);cursor:pointer;box-shadow:0 9px 0 rgba(0,0,0,.25)}.start:focus-visible,.answer:focus-visible ight:900}.answer span:last-child{display:flex;align-items:center;padding:12px 16px;text-align:left;font-weight:800;line-height:1.28}.answer.correct{border-color:var(--green);background:#eafff3}.answer.wrong{border-color:var(--red);background:#fff0ef}.result{display:none;flex:1;align-content:center;gap:18px;min-height:390px}.result.show{display:grid}.result-panel{padding:24px;border:2px solid var(--gold);border-radius:14px;color:var(--ink);background:var(--cream)}.result h2{margin:0 0 10px;color:var(--navy);font-size:clamp(1.45rem,4vw,2rem)}.coupon-form,.coupon{margin:18px 0 0;padding:18px;border:2px dashed #b57711;border-radius:12px;background:#fff;color:var(--navy);font-weight:900}.coupon-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:10px}.coupon-input{min-height:50px;width:100%;border:2px solid rgba(3,19,58,.25);border-radius:9px;padding:0 14px;font:inherit;font-weight:700}.coupon-button,.retry{min-height:50px;border:0;border-radius:9px;padding:0 16px;font-weight:900;cursor:pointer}.coupon-button{color:#fff;background:var(--red)}.retry{width:max-content;max-width:100%;color:var(--navy);background:var(--gold)}.status{min-height:22px;margin:10px 0 0}.ok{color:#08713f}.err{color:#b91c1c}.quiz.completed .quiz-body,.quiz.completed .progress{display:none}@media(max-width:900px){.page{padding:10px}.cover-hero,.app{grid-template-columns:1fr;min-height:auto}.cover-img{min-height:auto;aspect-ratio:2048/732}.visual{min-height:300px}.quiz{padding:22px}}@media(max-width:560px){.topline{align-items:flex-start;flex-direction:column}.counter{min-width:100%}.coupon-row{grid-template-columns:1fr}.answer{grid-template-columns:50px 1fr}.rules li{padding:10px 12px}}</style></head><body><main class="page"><section class="cover" id="cover"><div class="cover-hero"><img class="cover-img" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEAYABgAAD/2wBDACMYGh4aFiMeHB4nJSMpNFc4NDAwNGpMUD9Xfm+EgnxveneLnMipi5S9lnd6ru2wvc7V4OLgh6f1//PZ/8jb4Nf/2wBDASUnJzQuNGY4OGbXj3qP19fX19fX19 nej osi'],0],['Starszy 1.9 TDI 110 KM kojarzy się najczęściej z:',['pompą rotacyjną VP37','common rail drugiej generacji','gaźnikiem','wtryskiem K-Jetronic'],0],['Nowsze 1.9 TDI PD oznacza:',['pompowtryskiwacze','gaźnik z ssaniem','wtrysk jednopunktowy','napęd elektryczny'],0],['Silnik 1.8T 20V ma:',['turbodoładowanie i 20 zaworów','20 cylindrów','common rail','brak doładowania'],0],['Silnik 2.8 V6 30V oznacza:',['V6 z pięcioma zaworami na cylinder','R4 z dwoma zaworami','diesla V6 bez turbo','silnik Wankla'],0],['Zerwanie paska rozrządu w 1.9 TDI grozi:',['poważnym uszkodzeniem silnika','rozładowaniem akumulatora','zablokowaniem radia','utratą klimatyzacji'],0],['Uszkodzony przepływomierz MAF w TDI często daje objaw:',['braku mocy','zbyt jasnych świateł','wycieku spryskiwaczy','piszczenia zamka'],0],['Zawór N75 w silnikach turbo odpowiada za:',['sterowanie ciśnieniem doładowania','podgrzewanie foteli','geometrię kół','sterowanie szybami'],0],['Moduł komfortu jest narażony na problemy szczególnie przy:',['zalaniu podłogi i wiązek pod dywanem','braku paliwa','zużyciu żarówki tablicy','przebiciu opony'],0],['Zatkane odpływy podszybia mogą powodować:',['dostawanie się wody do kabiny','większą moc silnika','brak luzu w zawieszeniu','samoczynną geometrię'],0],['Typowy rozstaw śrub felg Passata B5 to:',['5x112','4x100','5x120','6x139,7'],0]];const pref=['Warsztat:','Diagnostyka:','Serwis:','Test techniczny:','Próba drogowa:','Kontrola:','Pomiar:','Naprawa:','Egzamin:','Ekspert:','Mechanik:','Elektryka:','Silnik:','Zawieszenie:','Napęd:','Części:','Objaw:','Awaria:','Układ:','Sprawdzenie:'];const cfg={serviceId:'service_wu2pmyl',templateId:'template_jhht9ba',publicKey:'iu3vmvW35OSv8wBJM'};const letters=['A','B','C','D'];let bank=pref.flatMap((p,i)=>base.map((x,j)=>({id:i+'-'+j,q:p+' '+x[0],a:x[1],c:x[2]})));let qs=[],idx=0,score=0,lock=false;const $=s=>document.querySelector(s);function sh(a){a=[...a];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function prep(){qs=sh(bank).slice(0,10).map(x=>{let aa=sh(x.a.map((t,i)=>({t,i})));return{q:x.q,a:aa.map(v=>v.t),c:aa.findIndex(v=>v.i===x.c)}});idx=0;score=0;render()}function render(){lock=false;$('#quiz').classList.remove('completed');$('#result').classList.remove('show');$('#counter').textContent='Pytanie '+(idx+1)+'/10';$('#bar').style.width=((idx+1)*10)+'%';$('#q').textContent=qs[idx].q;$('#answers').innerHTML='';qs[idx].a.forEach((t,i)=>{let b=document.createElement('button');b.className='answer';b.type='button';b.innerHTML='<span>'+letters[i]+'</span><span>'+t+'</span>';b.onclick=()=>choose(i,b);$('#answers').appendChild(b)})}function choose(i,b){if(lock)return;lock=true;let all=[...document.querySelectorAll('.answer')];if(i===qs[idx].c){score++;b.classList.add('correct')}else b.classList.add('wrong');all.forEach(x=>x.disabled=true);setTimeout(()=>{idx++;idx<10?render():finish()},320)}function finish(){$('#quiz').classList.add('completed');$('#result').classList.add('show');$('#counter').textContent='Koniec quizu';$('#title').textContent=score===10?'Wynik perfekcyjny':'Twój wynik';$('#scoreText').textContent='Poprawne odpowiedzi: '+score+'/10';$('#coupon').innerHTML=score===10?`<form class='coupon-form' id='couponForm'><label for='mail'>Gratulacje. Podaj e-mail, a wyślemy Ci kod rabatowy 30%.</label><div class='coupon-row'><input class='coupon-input' id='mail' type='text' inputmode='email' autocomplete='email' placeholder='adres@email.pl' required><button class='coupon-button' type='submit'>Odbierz kupon</button></div><p class='status' id='status'></p></form>`:`<p class='coupon'>Kupon e-mail jest dostępny tylko przy wyniku 10/10.</p>`;if(score===10)mail()}function mail(){let f=$('#couponForm'),m=$('#mail'),s=$('#status'),b=f.querySelector('button');f.onsubmit=async e=>{e.preventDefault();let email=m.value.trim();if(!email.includes('@')||!email.includes('.')){s.textContent='Wpisz poprawny adres e-mail.';s.className='status err';return}b.disabled=true;b.textContent='Wysyłanie...';try{let d=new Date();let end=new Date(d.getFullYear(),d.getMonth()+1,0).toLocaleDateString('pl-PL');await emailjs.send(cfg.serviceId,cfg.templateId,{to_email:email,user_email:email,coupon_code:'GKSARK#$#30',score:10,total:10,valid_until:end},{publicKey:cfg.publicKey});s.textContent='Kupon został wysłany na podany adres e-mail.';s.className='status ok';m.disabled=true;b.textContent='Wysłano'}catch(err){s.textContent='Nie udało się wysłać kuponu. Spróbuj ponownie.';s.className='status err';b.disabled=false;b.textContent='Odbierz kupon'}}}$('#start').onclick=()=>{$('#cover').hidden=true;$('#app').hidden=false;window.scrollTo({top:0,behavior:'smooth'})};$('#retry').onclick=prep;prep();</script></body></html>
